<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JuneCheck - Check Info</title>
<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#0b0c10;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.container{
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding:20px;
  border-radius:20px;
}
input,button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}
button{
  background:#0A84FF;
  color:white;
  font-weight:bold;
}
.result{
  margin-top:15px;
  font-size:14px;
}
</style>
</head>
<body>
<div class="container">
<h2>Check Info Facebook / Telegram</h2>
<input id="uid" placeholder="Nhập UID hoặc Username">
<button onclick="check()">Kiểm tra</button>
<div class="result" id="result"></div>
</div>

<script>
async function check(){
  let uid = document.getElementById("uid").value;
  let res = await fetch("/api/check?uid="+uid);
  let data = await res.json();
  document.getElementById("result").innerText = JSON.stringify(data,null,2);
}
</script>
</body>
</html>
